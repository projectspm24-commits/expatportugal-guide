<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LRLYDTMX5H"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-LRLYDTMX5H');</script>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claim Successful — ExpatPortugal.guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{--ink:#1c1917;--ink2:#57534e;--ink3:#a8a29e;--cream:#f7f5f0;--warm:#f5f0e8;--card:#fff;--border:rgba(28,25,23,0.08);--border2:rgba(28,25,23,0.16);--red:#c0381a;--green:#15803d;--green-l:#f0fdf4;--r:10px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Outfit",sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.6;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60M0 0h60v60H0z' fill='none' stroke='%23d4cfc4' stroke-width='.3'/%3E%3Ccircle cx='30' cy='30' r='8' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3C/svg%3E")}
.full{max-width:560px;margin:0 auto;padding:2rem}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);padding:2rem;margin-top:2rem}
h1{font-family:"Playfair Display",serif;font-size:24px;margin-bottom:6px}
label{font-size:12px;color:var(--ink2);display:block;margin-bottom:4px;margin-top:14px;font-weight:500}
input,textarea{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:"Outfit",sans-serif;outline:none}
textarea{height:80px;resize:vertical}
.btn{padding:12px 24px;background:var(--red);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:"Outfit",sans-serif;width:100%;margin-top:18px}
</style>
</head>
<body>
<div class="full">
  <div style="text-align:center;padding-top:1rem">
    <div style="font-size:36px;margin-bottom:8px">&#9989;</div>
    <h1>Payment successful!</h1>
    <div style="font-size:13px;color:var(--ink2)" id="tier-label">Complete your business listing details below.</div>
  </div>

  <div class="card" id="form-card">
    <div style="font-size:15px;font-weight:500;margin-bottom:4px">Your business details</div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:8px">These details will be visible on your listing.</div>

    <label>Business name</label>
    <input id="c-name" placeholder="Will be pre-filled from your existing listing" />

    <label>Website URL</label>
    <input id="c-url" type="url" placeholder="https://yourbusiness.com" />

    <label>Contact email</label>
    <input id="c-email" type="email" placeholder="hello@yourbusiness.com" />

    <label>Phone number (optional)</label>
    <input id="c-phone" placeholder="+351 ..." />

    <label>Updated description</label>
    <textarea id="c-desc" placeholder="Tell expats about your business — what you offer, why they should visit..."></textarea>

    <div id="photo-section" style="margin-top:14px">
      <label>Photos <span id="photo-limit">(up to 3)</span></label>
      <div id="photo-previews" style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0"></div>
      <label for="photo-input" style="display:inline-block;padding:10px 18px;background:var(--green-l);color:var(--green);border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid rgba(21,128,61,0.15)">&#128247; Add photos</label>
      <input type="file" id="photo-input" accept="image/*" multiple onchange="handlePhotos(this)" style="display:none" />
      <div style="font-size:11px;color:var(--ink3);margin-top:6px">Max 5MB per photo. JPG or PNG.</div>
    </div>

    <button class="btn" onclick="submitClaim()">Update listing &rarr;</button>
  </div>

  <div id="success-msg" style="display:none;text-align:center;padding:2rem">
    <div style="font-size:36px;margin-bottom:10px">&#127881;</div>
    <div style="font-size:18px;font-weight:500;margin-bottom:6px">Listing updated!</div>
    <div style="font-size:13px;color:var(--ink2);margin-bottom:16px;line-height:1.7">Your business is now verified on ExpatPortugal.guide.<br>Your listing is live immediately.</div>
    <a href="directory.html" style="color:var(--red);font-size:13px;font-weight:500">Back to Explore &rarr;</a>
  </div>
</div>

<script>
var SB_URL = 'https://waywvckvyizqkuuaecrp.supabase.co';
var SB_KEY = 'sb_publishable_vYRR5942-HlgkWNhuODLdg_eGfOFy4b';
var params = new URLSearchParams(window.location.search);
var tier = params.get('tier') || 'claimed';
var bizId = params.get('biz_id');
var maxPhotos = tier === 'featured' ? 5 : 3;
var uploadedPhotoUrls = [];

document.getElementById('tier-label').textContent = (tier === 'featured' ? 'Featured' : 'Claimed') + ' listing — complete your details below.';
document.getElementById('photo-limit').textContent = '(up to ' + maxPhotos + ')';

/* Load existing business data */
async function loadBiz() {
  if (!bizId) return;
  try {
    var res = await fetch(SB_URL + '/rest/v1/local_businesses?id=eq.' + bizId, {
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
    });
    var data = await res.json();
    if (data.length) {
      var b = data[0];
      document.getElementById('c-name').value = b.name || '';
      document.getElementById('c-url').value = b.url || '';
      document.getElementById('c-desc').value = b.reason || '';
    }
  } catch(e) {}
}
loadBiz();

function handlePhotos(input) {
  var files = Array.from(input.files);
  if (uploadedPhotoUrls.length + files.length > maxPhotos) {
    alert('Maximum ' + maxPhotos + ' photos allowed.');
    return;
  }
  files.forEach(function(file) {
    if (file.size > 5 * 1024 * 1024) { alert(file.name + ' is too large (max 5MB)'); return; }
    if (uploadedPhotoUrls.length >= maxPhotos) return;
    uploadPhoto(file);
  });
  input.value = '';
}

async function uploadPhoto(file) {
  var fileName = Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + file.name.split('.').pop();
  var previews = document.getElementById('photo-previews');
  var div = document.createElement('div');
  div.style.cssText = 'width:80px;height:80px;border-radius:8px;background:#f5f0e8;display:flex;align-items:center;justify-content:center;font-size:11px;color:#a8a29e;position:relative;overflow:hidden';
  div.textContent = 'Uploading...';
  previews.appendChild(div);
  try {
    var res = await fetch(SB_URL + '/storage/v1/object/housing-photos/' + fileName, {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': file.type, 'x-upsert': 'true' },
      body: file
    });
    if (res.ok) {
      var url = SB_URL + '/storage/v1/object/public/housing-photos/' + fileName;
      uploadedPhotoUrls.push(url);
      div.innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover" /><button onclick="removePhoto(\'' + url + '\',this.parentElement)" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1">&times;</button>';
    } else { div.textContent = 'Error'; setTimeout(function() { div.remove(); }, 2000); }
  } catch(e) { div.textContent = 'Error'; setTimeout(function() { div.remove(); }, 2000); }
  document.getElementById('photo-limit').textContent = '(' + uploadedPhotoUrls.length + '/' + maxPhotos + ')';
  if (uploadedPhotoUrls.length >= maxPhotos) document.querySelector('label[for="photo-input"]').style.display = 'none';
}

function removePhoto(url, el) {
  uploadedPhotoUrls = uploadedPhotoUrls.filter(function(u) { return u !== url; });
  el.remove();
  document.getElementById('photo-limit').textContent = '(' + uploadedPhotoUrls.length + '/' + maxPhotos + ')';
  document.querySelector('label[for="photo-input"]').style.display = 'inline-block';
}

async function submitClaim() {
  var name = document.getElementById('c-name').value.trim();
  var url = document.getElementById('c-url').value.trim();
  var email = document.getElementById('c-email').value.trim();
  if (!email) { alert('Please provide your contact email.'); return; }

  /* Build updated price_range preserving existing rating data */
  try {
    var res = await fetch(SB_URL + '/rest/v1/local_businesses?id=eq.' + bizId, {
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
    });
    var existing = await res.json();
    var oldPR = existing.length ? existing[0].price_range || '' : '';
    /* Preserve rating and reviews, update tier */
    var pr = {};
    oldPR.split('|').forEach(function(p) { var kv = p.split(':'); if (kv.length >= 2) pr[kv[0]] = kv.slice(1).join(':'); });
    pr.tier = tier;
    var newPR = Object.keys(pr).map(function(k) { return k + ':' + pr[k]; }).join('|');

    var photos = uploadedPhotoUrls.join(',');
    var phone = document.getElementById('c-phone').value.trim();
    var desc = document.getElementById('c-desc').value.trim();

    await fetch(SB_URL + '/rest/v1/local_businesses?id=eq.' + bizId, {
      method: 'PATCH',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({
        name: name || undefined,
        url: url,
        reason: desc || undefined,
        price_range: newPR,
        address: photos || undefined,
        emoji: existing.length ? existing[0].emoji : '📍'
      })
    });

    /* Save claim details to events for admin tracking */
    await fetch(SB_URL + '/rest/v1/events', {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({
        title: 'Business claimed: ' + name,
        description: 'Tier: ' + tier + '\nEmail: ' + email + (phone ? '\nPhone: ' + phone : '') + '\nBiz ID: ' + bizId,
        category: 'claim',
        status: 'handled',
        event_date: new Date().toISOString().slice(0, 10)
      })
    });

    /* Subscribe to newsletter */
    fetch('https://api.buttondown.com/v1/subscribers', {
      method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Token 0ed48c80-0e4d-4916-a3ab-f2aea603cea1' },
      body: JSON.stringify({ email: email, tags: ['business-owner'] })
    }).catch(function() {});

    document.getElementById('form-card').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  } catch(e) { alert('Something went wrong. Please email hello@expatportugal.guide with your details.'); }
}
</script>
</body>
</html>
