<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Events Calendar — ExpatPortugal.guide</title>
<meta name="description" content="All expat events in Portugal. Markets, meetups, fado nights, surf, food festivals, workshops, and more. Filter by region and category." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{--ink:#1c1917;--ink2:#57534e;--ink3:#a8a29e;--cream:#f7f5f0;--warm:#f5f0e8;--card:#fff;--border:rgba(28,25,23,0.08);--border2:rgba(28,25,23,0.16);--red:#c0381a;--red-l:#fdf0ec;--red-d:#a83015;--green:#15803d;--green-l:#f0fdf4;--amber:#b45309;--amber-l:#fffbeb;--blue:#1d4ed8;--blue-l:#eff6ff;--purple:#7c3aed;--purple-l:#f5f3ff;--r:10px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Outfit",sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.6;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60M0 0h60v60H0z' fill='none' stroke='%23d4cfc4' stroke-width='.3'/%3E%3Ccircle cx='30' cy='30' r='8' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3Ccircle cx='0' cy='0' r='4' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3Ccircle cx='60' cy='0' r='4' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3Ccircle cx='0' cy='60' r='4' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3Ccircle cx='60' cy='60' r='4' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3C/svg%3E")}
a{text-decoration:none;color:inherit}
nav{background:rgba(247,245,240,0.96);border-bottom:0.5px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px)}
.logo{font-family:"Playfair Display",serif;font-size:19px;color:var(--ink)}
.nav-links{display:flex;gap:2px}
.nl{font-size:13px;padding:6px 11px;border-radius:var(--r);color:var(--ink2);display:inline-flex;align-items:center}.nl:hover{background:var(--warm);color:var(--ink)}.nl.on{color:var(--ink);font-weight:500}
.full{max-width:1100px;margin:0 auto;padding:0 2rem}

.cal-hero{padding:2rem 0 1rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.cal-hero-t{font-family:"Playfair Display",serif;font-size:clamp(24px,3vw,34px)}
.cal-hero-sub{font-size:13px;color:var(--ink2)}

.cal-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.cal-nav-btn{padding:6px 14px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--card);cursor:pointer;font-family:"Outfit",sans-serif;font-size:12px;color:var(--ink2);transition:all .15s}
.cal-nav-btn:hover{border-color:var(--ink);color:var(--ink)}
.cal-month{font-family:"Playfair Display",serif;font-size:18px;min-width:180px;text-align:center}
.cal-today-btn{padding:6px 14px;border:0.5px solid var(--red);border-radius:var(--r);background:var(--red-l);cursor:pointer;font-family:"Outfit",sans-serif;font-size:12px;color:var(--red);font-weight:500}
.cal-today-btn:hover{background:var(--red);color:white}
.cal-view-toggle{margin-left:auto;display:flex;border:0.5px solid var(--border2);border-radius:var(--r);overflow:hidden}
.cal-vt{padding:6px 14px;font-size:12px;cursor:pointer;background:var(--card);font-family:"Outfit",sans-serif;color:var(--ink2);border:none;transition:all .1s}
.cal-vt.on{background:var(--ink);color:white}

.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:10px;border-bottom:0.5px solid var(--border)}
.fb{font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);color:var(--ink2);cursor:pointer;background:var(--card);font-family:"Outfit",sans-serif;transition:all .15s}
.fb:hover{border-color:var(--ink);color:var(--ink)}.fb.on{background:var(--red);color:white;border-color:var(--red)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:2rem}
.cal-hd{background:var(--warm);padding:8px;text-align:center;font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.cal-cell{background:var(--card);min-height:100px;padding:6px;position:relative;cursor:pointer;transition:background .1s}
.cal-cell:hover{background:var(--warm)}
.cal-cell.today{background:#fef3c7}
.cal-cell.other{background:var(--cream);opacity:.5}
.cal-day{font-size:12px;font-weight:500;margin-bottom:4px;color:var(--ink2)}
.cal-cell.today .cal-day{color:var(--red);font-weight:500}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;display:block;line-height:1.4}
.cal-ev:hover{opacity:.8}
.cal-ev.cat-music{background:#EEEDFE;color:#3C3489}
.cal-ev.cat-social{background:var(--green-l);color:var(--green)}
.cal-ev.cat-sport{background:var(--blue-l);color:var(--blue)}
.cal-ev.cat-market{background:var(--red-l);color:var(--red)}
.cal-ev.cat-culture{background:#FFF3E0;color:#E65100}
.cal-ev.cat-food{background:#FFF8E1;color:#F57F17}
.cal-ev.cat-art{background:var(--purple-l);color:var(--purple)}
.cal-ev.cat-family{background:#E8F5E9;color:#2E7D32}
.cal-more{font-size:10px;color:var(--ink3);padding:2px 5px}

.list-view{display:none;margin-bottom:2rem}
.list-day{margin-bottom:1.25rem}
.list-day-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.list-day-date{font-family:"Playfair Display",serif;font-size:15px}
.list-day-label{font-size:12px;color:var(--ink3)}
.list-ev{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px;display:flex;gap:12px;margin-bottom:6px;transition:all .2s;cursor:pointer}
.list-ev:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.05)}
.list-ev-img{width:70px;height:70px;border-radius:var(--r);object-fit:cover;flex-shrink:0}
.list-ev-body{flex:1}
.list-ev-title{font-size:14px;font-weight:500;margin-bottom:2px}
.list-ev-meta{font-size:12px;color:var(--ink3)}
.list-ev-tag{font-size:10px;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px}

.ev-detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:center;justify-content:center}
.ev-detail-modal.open{display:flex}
.ev-detail{background:var(--card);border-radius:var(--rl);padding:1.75rem;width:90%;max-width:500px;position:relative;max-height:80vh;overflow-y:auto}
.ed-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink3)}

.submit-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;background:var(--warm);border:0.5px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--ink2);cursor:pointer;font-family:"Outfit",sans-serif;transition:all .15s;margin-bottom:2rem}
.submit-btn:hover{background:var(--card);border-color:var(--border2);color:var(--ink)}

footer{background:var(--ink);color:rgba(255,255,255,0.5);padding:2rem;margin-top:3rem}
.fi{max-width:1100px;margin:0 auto;font-size:12px;text-align:center}

@media(max-width:700px){.cal-grid{display:none}.list-view{display:block!important}.cal-view-toggle{display:none}.full{padding:0 1rem}nav{padding:0 1rem}.cal-cell{min-height:70px}}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">&#127477;&#127481; ExpatPortugal<span style="font-weight:300;opacity:.5">.guide</span></a>
  <div class="nav-links">
    <a class="nl" href="index.html">Home</a>
    <a class="nl on" href="calendar.html">Events</a>
    <a class="nl" href="directory.html">Directory</a>
    <a class="nl" href="communities.html">Communities</a>
    <a class="nl" href="news.html">News</a>
  </div>
</nav>

<div class="full">
  <div class="cal-hero">
    <div>
      <div class="cal-hero-t">Events calendar</div>
      <div class="cal-hero-sub">Everything happening in Portugal for expats &mdash; markets, meetups, fado, surf, festivals, and more.</div>
    </div>
    <a class="submit-btn" href="#" onclick="if(window.openSubmitEvent)openSubmitEvent();else window.location='index.html';return false">&#128197; Submit an event</a>
  </div>

  <div class="cal-controls">
    <button class="cal-nav-btn" onclick="changeMonth(-1)">&larr; Previous</button>
    <div class="cal-month" id="cal-month"></div>
    <button class="cal-nav-btn" onclick="changeMonth(1)">Next &rarr;</button>
    <button class="cal-today-btn" onclick="goToday()">Today</button>
    <div class="cal-view-toggle">
      <button class="cal-vt on" id="vt-cal" onclick="setView('calendar')">Calendar</button>
      <button class="cal-vt" id="vt-list" onclick="setView('list')">List</button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="fb on" onclick="setCatFilter('all',this)">All</button>
    <button class="fb" onclick="setCatFilter('social',this)">&#128101; Social</button>
    <button class="fb" onclick="setCatFilter('music',this)">&#127925; Music</button>
    <button class="fb" onclick="setCatFilter('market',this)">&#128717; Markets</button>
    <button class="fb" onclick="setCatFilter('food',this)">&#127860; Food</button>
    <button class="fb" onclick="setCatFilter('sport',this)">&#127947; Sport</button>
    <button class="fb" onclick="setCatFilter('culture',this)">&#127984; Culture</button>
    <button class="fb" onclick="setCatFilter('art',this)">&#127912; Art</button>
    <button class="fb" onclick="setCatFilter('family',this)">&#128118; Family</button>
    <span style="font-size:10px;color:var(--ink3);padding:4px 6px">|</span>
    <button class="fb" onclick="setRegFilter('all',this)">All regions</button>
    <button class="fb" onclick="setRegFilter('Lisbon',this)">Lisbon</button>
    <button class="fb" onclick="setRegFilter('Porto',this)">Porto</button>
    <button class="fb" onclick="setRegFilter('Algarve',this)">Algarve</button>
    <button class="fb" onclick="setRegFilter('Cascais',this)">Cascais</button>
    <button class="fb" onclick="setRegFilter('Ericeira',this)">Ericeira</button>
    <button class="fb" onclick="setRegFilter('Peniche',this)">Peniche</button>
    <button class="fb" onclick="setRegFilter('Mafra',this)">Mafra</button>
    <button class="fb" onclick="setRegFilter('Braga',this)">Braga</button>
    <button class="fb" onclick="setRegFilter('Alentejo',this)">Alentejo</button>
    <button class="fb" onclick="setRegFilter('Madeira',this)">Madeira</button>
    <button class="fb" onclick="setRegFilter('Azores',this)">Azores</button>
  </div>

  <div class="cal-grid" id="cal-grid"></div>
  <div class="list-view" id="list-view"></div>
</div>

<div class="ev-detail-modal" id="ev-modal" onclick="if(event.target===this)closeEvModal()">
  <div class="ev-detail" id="ev-detail">
    <button class="ed-close" onclick="closeEvModal()">&times;</button>
    <div id="ev-detail-content"></div>
  </div>
</div>

<footer>
  <div class="fi">
    <div style="margin-bottom:12px">&#127477;&#127481; ExpatPortugal.guide &middot; <a href="index.html" style="color:rgba(255,255,255,0.7)">Home</a> &middot; <a href="directory.html" style="color:rgba(255,255,255,0.7)">Directory</a> &middot; <a href="communities.html" style="color:rgba(255,255,255,0.7)">Communities</a></div>
    <div>&copy; 2026 ExpatPortugal.guide</div>
  </div>
</footer>

<script>
var SB_URL = 'https://waywvckvyizqkuuaecrp.supabase.co';
var SB_KEY = 'sb_publishable_vYRR5942-HlgkWNhuODLdg_eGfOFy4b';
var currentYear, currentMonth;
var allEvents = [];
var catFilter = 'all';
var regFilter = 'all';
var currentView = 'calendar';
var dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var catImages = {
  music:'https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=160&h=160&fit=crop',
  social:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=160&h=160&fit=crop',
  sport:'https://images.unsplash.com/photo-1551632811-561732d1e306?w=160&h=160&fit=crop',
  market:'https://images.unsplash.com/photo-1555881400-74d7acaacd8b?w=160&h=160&fit=crop',
  culture:'https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=160&h=160&fit=crop',
  food:'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=160&h=160&fit=crop',
  art:'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=160&h=160&fit=crop',
  family:'https://images.unsplash.com/photo-1536640712-4d998f60b42c?w=160&h=160&fit=crop'
};

var regionCities = {
  Algarve:['Algarve','Faro','Lagos','Albufeira','Tavira','Vilamoura','Loulé','Olhão','Portimão','Silves','Sagres'],
  Lisbon:['Lisbon','Lisboa'],Porto:['Porto'],Ericeira:['Ericeira'],
  Cascais:['Cascais','Sintra','Estoril'],Peniche:['Peniche'],Mafra:['Mafra'],
  Braga:['Braga','Guimarães'],Alentejo:['Alentejo','Évora','Beja'],
  Madeira:['Madeira','Funchal'],Azores:['Azores','Açores','Ponta Delgada']
};

function init() {
  var now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  loadAllEvents();
}

async function loadAllEvents() {
  var start = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-01';
  var endMonth = currentMonth === 11 ? 0 : currentMonth + 1;
  var endYear = currentMonth === 11 ? currentYear + 1 : currentYear;
  var end = endYear + '-' + String(endMonth + 1).padStart(2, '0') + '-01';
  try {
    var res = await fetch(SB_URL + '/rest/v1/events?status=eq.approved&category=neq.review&event_date=gte.' + start + '&event_date=lt.' + end + '&order=event_date.asc,event_time.asc&limit=200', {
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
    });
    allEvents = await res.json();
    render();
  } catch(e) { console.error(e); }
}

function getFiltered() {
  return allEvents.filter(function(e) {
    if (catFilter !== 'all' && e.category !== catFilter) return false;
    if (regFilter !== 'all') {
      var cities = regionCities[regFilter] || [regFilter];
      var match = cities.some(function(c) { return (e.city || '').toLowerCase().indexOf(c.toLowerCase()) !== -1; });
      if (!match && e.city !== 'All Portugal') return false;
    }
    return true;
  });
}

function render() {
  document.getElementById('cal-month').textContent = monthNames[currentMonth] + ' ' + currentYear;
  if (currentView === 'calendar') renderCalendar();
  else renderList();
}

function renderCalendar() {
  var grid = document.getElementById('cal-grid');
  var filtered = getFiltered();
  var byDate = {};
  filtered.forEach(function(e) { if (!byDate[e.event_date]) byDate[e.event_date] = []; byDate[e.event_date].push(e); });

  var firstDay = new Date(currentYear, currentMonth, 1);
  var startDow = (firstDay.getDay() + 6) % 7;
  var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  var today = new Date().toISOString().slice(0, 10);

  var html = dayNames.map(function(d) { return '<div class="cal-hd">' + d + '</div>'; }).join('');

  for (var i = 0; i < startDow; i++) {
    html += '<div class="cal-cell other"></div>';
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    var isToday = dateStr === today;
    var evs = byDate[dateStr] || [];
    html += '<div class="cal-cell' + (isToday ? ' today' : '') + '" onclick="showDayEvents(\'' + dateStr + '\')">';
    html += '<div class="cal-day">' + d + '</div>';
    evs.slice(0, 3).forEach(function(e) {
      html += '<div class="cal-ev cat-' + (e.category || 'social') + '" onclick="event.stopPropagation();showEventDetail(' + e.id + ')">' + e.title + '</div>';
    });
    if (evs.length > 3) html += '<div class="cal-more">+' + (evs.length - 3) + ' more</div>';
    html += '</div>';
  }

  var totalCells = startDow + daysInMonth;
  var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (var i = 0; i < remaining; i++) html += '<div class="cal-cell other"></div>';

  grid.innerHTML = html;
}

function renderList() {
  var el = document.getElementById('list-view');
  var filtered = getFiltered();
  if (!filtered.length) {
    el.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--ink3);background:var(--card);border-radius:var(--rl)">No events found for this month and filter.</div>';
    return;
  }
  var byDate = {};
  filtered.forEach(function(e) { if (!byDate[e.event_date]) byDate[e.event_date] = []; byDate[e.event_date].push(e); });
  var dates = Object.keys(byDate).sort();

  el.innerHTML = dates.map(function(dateStr) {
    var d = new Date(dateStr + 'T12:00:00');
    var dayLabel = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    var evs = byDate[dateStr];
    return '<div class="list-day">' +
      '<div class="list-day-header"><div class="list-day-date">' + dayLabel + '</div><div class="list-day-label">' + evs.length + ' event' + (evs.length > 1 ? 's' : '') + '</div></div>' +
      evs.map(function(e) {
        var img = catImages[e.category] || catImages.culture;
        var tagClass = 'cat-' + (e.category || 'social');
        return '<div class="list-ev" onclick="showEventDetail(' + e.id + ')">' +
          '<img class="list-ev-img" src="' + img + '" alt="" onerror="this.style.display=\'none\'" />' +
          '<div class="list-ev-body">' +
          '<div class="list-ev-title">' + e.title + '</div>' +
          '<div class="list-ev-meta">' + [e.venue, e.city].filter(Boolean).join(', ') + (e.event_time ? ' &middot; ' + e.event_time : '') + (e.price && e.price !== 'Free' ? ' &middot; ' + e.price : '') + '</div>' +
          '<span class="list-ev-tag cal-ev ' + tagClass + '">' + (e.category || 'social') + '</span>' +
          '</div></div>';
      }).join('') + '</div>';
  }).join('');
}

function showDayEvents(dateStr) {
  var filtered = getFiltered().filter(function(e) { return e.event_date === dateStr; });
  if (!filtered.length) return;
  if (filtered.length === 1) { showEventDetail(filtered[0].id); return; }
  var d = new Date(dateStr + 'T12:00:00');
  var dayLabel = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('ev-detail-content').innerHTML =
    '<div style="font-family:Playfair Display,serif;font-size:18px;margin-bottom:14px">' + dayLabel + '</div>' +
    '<div style="font-size:13px;color:var(--ink3);margin-bottom:12px">' + filtered.length + ' events</div>' +
    filtered.map(function(e) {
      return '<div style="padding:10px;border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer" onclick="closeEvModal();setTimeout(function(){showEventDetail(' + e.id + ')},200)">' +
        '<div style="font-size:14px;font-weight:500">' + e.title + '</div>' +
        '<div style="font-size:12px;color:var(--ink3)">' + [e.venue, e.city].filter(Boolean).join(', ') + (e.event_time ? ' · ' + e.event_time : '') + '</div>' +
        '<span class="cal-ev cat-' + (e.category || 'social') + '" style="display:inline-block;margin-top:4px">' + (e.category || 'social') + '</span>' +
        '</div>';
    }).join('');
  document.getElementById('ev-modal').classList.add('open');
}

function showEventDetail(id) {
  var e = allEvents.find(function(ev) { return ev.id === id; });
  if (!e) return;
  var d = new Date(e.event_date + 'T12:00:00');
  var dateStr = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  var img = catImages[e.category] || catImages.culture;
  document.getElementById('ev-detail-content').innerHTML =
    '<div style="width:100%;height:160px;border-radius:var(--r);overflow:hidden;margin-bottom:14px"><img src="' + img + '" style="width:100%;height:100%;object-fit:cover" alt="" /></div>' +
    '<span class="cal-ev cat-' + (e.category || 'social') + '" style="display:inline-block;margin-bottom:8px;font-size:11px">' + (e.category || 'social') + '</span>' +
    '<div style="font-family:Playfair Display,serif;font-size:20px;margin-bottom:6px">' + e.title + '</div>' +
    '<div style="font-size:13px;color:var(--ink3);margin-bottom:12px">' +
    '&#128197; ' + dateStr + (e.event_time ? ' &middot; ' + e.event_time : '') + '<br>' +
    '&#128205; ' + [e.venue, e.city].filter(Boolean).join(', ') +
    (e.price && e.price !== 'Free' ? '<br>&#128176; ' + e.price : '<br>&#127381; Free entry') +
    '</div>' +
    (e.description ? '<div style="font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:14px">' + e.description + '</div>' : '') +
    (e.url ? '<a href="' + e.url + '" target="_blank" rel="noopener" style="display:inline-block;padding:8px 18px;background:var(--red);color:white;border-radius:var(--r);font-size:13px;font-weight:500">More info &rarr;</a>' : '');
  document.getElementById('ev-modal').classList.add('open');
}

function closeEvModal() { document.getElementById('ev-modal').classList.remove('open'); }

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  loadAllEvents();
}

function goToday() {
  var now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  loadAllEvents();
}

function setView(v) {
  currentView = v;
  document.getElementById('vt-cal').classList.toggle('on', v === 'calendar');
  document.getElementById('vt-list').classList.toggle('on', v === 'list');
  document.getElementById('cal-grid').style.display = v === 'calendar' ? 'grid' : 'none';
  document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
  render();
}

function setCatFilter(c, el) {
  catFilter = c;
  document.querySelectorAll('.filter-bar .fb').forEach(function(b) { b.classList.remove('on'); });
  el.classList.add('on');
  render();
}

function setRegFilter(r, el) {
  regFilter = r;
  render();
}

init();
</script>
</body>
</html>
