<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment Successful — ExpatPortugal.guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{--ink:#1c1917;--ink2:#57534e;--ink3:#a8a29e;--cream:#f7f5f0;--warm:#f5f0e8;--card:#fff;--border:rgba(28,25,23,0.08);--border2:rgba(28,25,23,0.16);--red:#c0381a;--green:#15803d;--green-l:#f0fdf4;--r:10px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Outfit",sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.6;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60M0 0h60v60H0z' fill='none' stroke='%23d4cfc4' stroke-width='.3'/%3E%3Ccircle cx='30' cy='30' r='8' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3Ccircle cx='0' cy='0' r='4' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3Ccircle cx='60' cy='0' r='4' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3Ccircle cx='0' cy='60' r='4' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3Ccircle cx='60' cy='60' r='4' fill='none' stroke='%23c8c0b0' stroke-width='.3'/%3E%3C/svg%3E")}
.full{max-width:600px;margin:0 auto;padding:2rem}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);padding:2rem;margin-top:2rem}
h1{font-family:"Playfair Display",serif;font-size:24px;margin-bottom:6px}
label{font-size:12px;color:var(--ink2);display:block;margin-bottom:4px;margin-top:14px;font-weight:500}
input,select,textarea{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:"Outfit",sans-serif;background:var(--card);outline:none}
textarea{height:80px;resize:vertical}
.btn{padding:12px 24px;background:var(--red);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:"Outfit",sans-serif;width:100%;margin-top:18px}
.btn:hover{background:#a83015}
.success{display:none;text-align:center;padding:2rem}
</style>
</head>
<body>
<div class="full">
  <div style="text-align:center;padding-top:1rem">
    <div style="font-size:36px;margin-bottom:8px">&#9989;</div>
    <h1>Payment successful!</h1>
    <div style="font-size:13px;color:var(--ink2)" id="tier-label">Now fill in your listing details below.</div>
  </div>

  <div class="card" id="form-card">
    <div style="font-size:15px;font-weight:500;margin-bottom:4px">Your listing details</div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:8px">We'll publish within 24 hours.</div>

    <label>Listing title *</label>
    <input id="s-title" placeholder="e.g. Sunny 1-bed in Estrela with balcony" />

    <label>City *</label>
    <select id="s-city" onchange="toggleOtherCity()">
      <option>Lisbon</option><option>Porto</option><option>Algarve</option><option>Cascais</option><option>Ericeira</option><option>Peniche</option><option>Mafra</option><option>Braga</option><option>Alentejo</option><option>Madeira</option><option value="other">Other city...</option>
    </select>
    <input id="s-city-other" type="text" placeholder="Type the city or town name" style="display:none;margin-top:6px" />

    <label>Neighbourhood</label>
    <input id="s-hood" placeholder="e.g. Estrela, Alfama, Bairro Alto" />

    <label>Apartment type *</label>
    <select id="s-type">
      <option value="studio">Studio</option><option value="1bed">1-bedroom</option><option value="2bed">2-bedroom</option><option value="3bed">3+ bedrooms</option><option value="room">Private room</option>
    </select>

    <label>Monthly rent (&euro;) *</label>
    <input id="s-rent" type="number" placeholder="1200" />

    <label>Available from *</label>
    <input id="s-from" type="date" />

    <label>Available until *</label>
    <input id="s-until" type="date" />

    <label>Description *</label>
    <textarea id="s-desc" placeholder="Tell people about the place: furnished? wifi? balcony? close to metro? pets ok?"></textarea>

    <label>Your contact email *</label>
    <input id="s-email" type="email" placeholder="your@email.com" />

    <div id="photo-section" style="margin-top:14px">
      <label>Photos <span id="photo-limit-label">(up to 3)</span></label>
      <div id="photo-previews" style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0"></div>
      <label for="photo-input" style="display:inline-block;padding:10px 18px;background:var(--green-l);color:var(--green);border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid rgba(21,128,61,0.15)">&#128247; Add photos</label>
      <input type="file" id="photo-input" accept="image/*" multiple onchange="handlePhotos(this)" style="display:none" />
      <div style="font-size:11px;color:var(--ink3);margin-top:6px">Max 5MB per photo. JPG or PNG.</div>
    </div>

    <div style="margin-top:14px;padding:10px 14px;background:var(--warm);border-radius:var(--r);font-size:11px;color:var(--ink2)">
      <label style="display:flex;align-items:flex-start;gap:8px;margin:0;cursor:pointer;font-weight:400">
        <input type="checkbox" id="s-sublet" style="width:auto;margin-top:3px" />
        <span>If subletting: I confirm I have written permission from my landlord.</span>
      </label>
    </div>

    <button class="btn" onclick="submitListing()">Submit listing &rarr;</button>
  </div>

  <div class="success" id="success-msg">
    <div style="font-size:36px;margin-bottom:10px">&#127881;</div>
    <div style="font-size:18px;font-weight:500;margin-bottom:6px">Listing submitted!</div>
    <div style="font-size:13px;color:var(--ink2);margin-bottom:16px;line-height:1.7">Your listing is live on the housing board now!<br>Landlords and expats can see it immediately.</div>
    <a href="housing.html" style="color:var(--red);font-size:13px;font-weight:500">Back to housing board &rarr;</a>
  </div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var tier = params.get('tier') || 'basic';
var maxPhotos = tier === 'featured' ? 10 : 3;
document.getElementById('tier-label').textContent = (tier === 'featured' ? 'Featured' : 'Basic') + ' listing — now fill in your details below.';
document.getElementById('photo-limit-label').textContent = '(up to ' + maxPhotos + ')';

var uploadedPhotoUrls = [];
var SB_URL = 'https://waywvckvyizqkuuaecrp.supabase.co';
var SB_KEY = 'sb_publishable_vYRR5942-HlgkWNhuODLdg_eGfOFy4b';

function handlePhotos(input) {
  var files = Array.from(input.files);
  if (uploadedPhotoUrls.length + files.length > maxPhotos) {
    alert('Maximum ' + maxPhotos + ' photos allowed. You have ' + uploadedPhotoUrls.length + ' already.');
    return;
  }
  files.forEach(function(file) {
    if (file.size > 5 * 1024 * 1024) { alert(file.name + ' is too large (max 5MB)'); return; }
    if (uploadedPhotoUrls.length >= maxPhotos) return;
    uploadPhoto(file);
  });
  input.value = '';
}

async function uploadPhoto(file) {
  var fileName = Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + file.name.split('.').pop();
  var previews = document.getElementById('photo-previews');
  
  /* Show loading preview */
  var div = document.createElement('div');
  div.style.cssText = 'width:80px;height:80px;border-radius:8px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink3);position:relative;overflow:hidden';
  div.textContent = 'Uploading...';
  div.id = 'preview-' + fileName;
  previews.appendChild(div);

  try {
    var res = await fetch(SB_URL + '/storage/v1/object/housing-photos/' + fileName, {
      method: 'POST',
      headers: {
        apikey: SB_KEY,
        Authorization: 'Bearer ' + SB_KEY,
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: file
    });

    if (res.ok) {
      var url = SB_URL + '/storage/v1/object/public/housing-photos/' + fileName;
      uploadedPhotoUrls.push(url);
      div.innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover" />' +
        '<button onclick="removePhoto(\'' + url + '\',this.parentElement)" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1">&times;</button>';
    } else {
      div.textContent = 'Error';
      div.style.color = 'var(--red)';
      setTimeout(function() { div.remove(); }, 2000);
    }
  } catch(e) {
    div.textContent = 'Error';
    div.style.color = 'var(--red)';
    setTimeout(function() { div.remove(); }, 2000);
  }

  /* Update label */
  document.getElementById('photo-limit-label').textContent = '(' + uploadedPhotoUrls.length + '/' + maxPhotos + ')';
  if (uploadedPhotoUrls.length >= maxPhotos) {
    document.querySelector('label[for="photo-input"]').style.display = 'none';
  }
}

function removePhoto(url, el) {
  uploadedPhotoUrls = uploadedPhotoUrls.filter(function(u) { return u !== url; });
  el.remove();
  document.getElementById('photo-limit-label').textContent = '(' + uploadedPhotoUrls.length + '/' + maxPhotos + ')';
  document.querySelector('label[for="photo-input"]').style.display = 'inline-block';
}

function toggleOtherCity() {
  var sel = document.getElementById('s-city');
  var other = document.getElementById('s-city-other');
  other.style.display = sel.value === 'other' ? 'block' : 'none';
  if (sel.value === 'other') other.focus();
}

async function submitListing() {
  var title = document.getElementById('s-title').value.trim();
  var email = document.getElementById('s-email').value.trim();
  var rent = document.getElementById('s-rent').value;
  var from = document.getElementById('s-from').value;
  var until = document.getElementById('s-until').value;
  var desc = document.getElementById('s-desc').value.trim();
  var cityVal = document.getElementById('s-city').value;
  var city = cityVal === 'other' ? document.getElementById('s-city-other').value.trim() : cityVal;
  if (!title || !email || !rent || !from || !until || !city) { alert('Please fill in all required fields.'); return; }

  var pr = 'rent:' + rent + '|type:' + document.getElementById('s-type').value + '|available:' + from + '|until:' + until + '|tier:' + tier + '|kind:available|confirmed:' + new Date().toISOString().slice(0,10);
  var photos = uploadedPhotoUrls.join(',');
  var data = {
    name: title, type: 'housing', city: city,
    area: document.getElementById('s-hood').value.trim(), reason: desc,
    url: email, price_range: pr, address: photos, emoji: '🏠', status: 'active'
  };

  try {
    await fetch('https://waywvckvyizqkuuaecrp.supabase.co/rest/v1/local_businesses', {
      method: 'POST',
      headers: {
        apikey: 'sb_publishable_vYRR5942-HlgkWNhuODLdg_eGfOFy4b',
        Authorization: 'Bearer sb_publishable_vYRR5942-HlgkWNhuODLdg_eGfOFy4b',
        'Content-Type': 'application/json',
        Prefer: 'return=minimal'
      },
      body: JSON.stringify(data)
    });
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  } catch(e) {
    alert('Something went wrong. Please email your details to hello@expatportugal.guide');
  }
}
</script>
</body>
</html>
